  <div class="nav-left">KBTU Lost & Found</div>

  <div class="nav-links">

    <a routerLink="/posts">Posts</a>
    <a routerLink="/map">Map</a>
    <a routerLink="/create">Create</a>
    <a routerLink="/my-posts">My Posts</a>
  </div>
